<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="大学思想政治理论课一体化学习资料库，包含思想道德与法治、中国近现代史纲要、马克思主义基本原理、毛泽东思想和中国特色社会主义理论体系概论、习近平新时代中国特色社会主义思想概论">
  <title>大学思政五课一体化学习资料库</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 顶部导航 -->
  <header class="header">
    <div class="header-inner">
      <div class="logo" onclick="showHome()">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
        </svg>
        <div class="logo-text">
          <span class="logo-title">思政五课一体化</span>
          <span class="logo-sub">学习资料库</span>
        </div>
      </div>
      <nav class="nav">
        <a href="#" class="active" onclick="showHome(); return false;">课程首页</a>
        <a href="#" onclick="showAllChapters(); return false;">章节总览</a>
        <a href="#" onclick="showSearch(); return false;">资料检索</a>
      </nav>
    </div>
  </header>

  <!-- 进度条 -->
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- 首页视图 -->
  <div id="homeView">
    <!-- 横幅区域 -->
    <section class="hero-section">
      <div class="container">
        <h1>大学思想政治理论课<br>一体化学习资料库</h1>
        <p>系统整合思想道德与法治、中国近现代史纲要、马克思主义基本原理、<br>毛泽东思想和中国特色社会主义理论体系概论、习近平新时代中国特色社会主义思想概论</p>
        <div class="hero-search">
          <input type="text" id="heroSearch" placeholder="搜索课程章节、知识点、关键词...">
          <button onclick="doSearch()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
            检索
          </button>
        </div>
        <!-- 快捷键提示 -->
        <div class="shortcuts-hint">
          <span class="shortcut">Ctrl+K</span> 快速搜索
          <span class="divider">|</span>
          <span class="shortcut">Esc</span> 返回首页
        </div>
      </div>
    </section>

    <!-- 学习统计 -->
    <section class="stats-section">
      <div class="container">
        <div class="stats-panel">
          <div class="stat-item">
            <div class="stat-value" id="totalCourses">5</div>
            <div class="stat-label">课程总数</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="totalChapters">23</div>
            <div class="stat-label">章节目录</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="totalQuestions">200+</div>
            <div class="stat-label">练习题量</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="studyProgress">0%</div>
            <div class="stat-label">学习进度</div>
          </div>
        </div>
      </div>
    </section>

    <!-- 五课卡片 -->
    <section class="courses-section">
      <div class="container">
        <div class="section-header">
          <h2>五门思想政治理论课程</h2>
          <p>点击课程卡片进入学习</p>
        </div>
        <div id="courseCards" class="course-cards"></div>
      </div>
    </section>
  </div>

  <!-- 课程详情视图 -->
  <div id="courseView" style="display: none;">
    <div class="course-header" id="courseHeader"></div>
    <div class="container">
      <div id="chapterList"></div>
    </div>
  </div>

  <!-- 章节学习视图 -->
  <div id="chapterView" style="display: none;">
    <div class="chapter-header" id="chapterHeader"></div>
    <div class="container">
      <div id="sectionList"></div>
      <button class="back-btn" onclick="backToCourse()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m15 18-6-6 6-6"></path>
        </svg>
        返回课程章节
      </button>
    </div>
  </div>

  <!-- 检索结果视图 -->
  <div id="searchView" style="display: none;">
    <div class="search-header">
      <div class="container">
        <h2>资料检索结果</h2>
        <div class="search-box-inline">
          <input type="text" id="searchInput" placeholder="搜索课程章节、知识点...">
          <button onclick="doSearch()">检索</button>
        </div>
      </div>
    </div>
    <div class="container">
      <div id="searchResults"></div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p>大学思想政治理论课一体化学习资料库</p>
      <p>五课融通 协同育人 | 思想道德与法治 · 中国近现代史纲要 · 马克思主义基本原理 · 毛概 · 习概</p>
    </div>
  </footer>

  <!-- 浮动操作按钮 -->
  <div class="fab-container" id="fabContainer">
    <button class="fab-btn fab-secondary visible" onclick="toggleBookmark()" id="fabBookmark">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
      </svg>
    </button>
    <button class="fab-btn fab-primary visible" onclick="showHome()" id="fabHome">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
    </button>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
